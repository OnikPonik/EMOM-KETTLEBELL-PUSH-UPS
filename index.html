<style>
  :root{
    --bg:#F4F2EC; --card:#FFFFFF; --ink:#16150F; --mute:#8C8779;
    --accent:#FF5A1F; --soft:#FFE9DF; --line:#ECE8DF; --green:#5B8C5A;
    --chip:#F4F2EC; --shadow:0 6px 22px rgba(0,0,0,.07);
    --chest:#E5484D; --triceps:#E8A23D; --shoulder:#2D6CDF; --lats:#3E9B4F;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  .btn,.wtab,.check,.dhead,.tbtn,.tx-x,.prow input,textarea.note{touch-action:manipulation;cursor:pointer;}
  html,body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  body{max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden;}
  #app{padding:calc(env(safe-area-inset-top) + 12px) 16px 96px;}
  .eyebrow{color:var(--accent);font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;}
  h1.title{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-top:2px;}
  .sub{color:var(--mute);font-size:13px;margin-top:6px;line-height:1.4;}
  .card{background:var(--card);border-radius:20px;box-shadow:var(--shadow);}
  .muted{color:var(--mute);}
  .row{display:flex;align-items:center;gap:10px;}
  .chip{display:inline-flex;align-items:center;gap:5px;background:var(--chip);color:var(--ink);font-size:11px;
    font-weight:700;letter-spacing:.3px;padding:5px 10px;border-radius:999px;}
  .chip.accent{background:var(--soft);color:var(--accent);font-weight:800;}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex:0 0 auto;}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;
    background:var(--accent);color:#fff;font-size:15px;font-weight:800;letter-spacing:.3px;
    padding:14px;border-radius:999px;box-shadow:0 6px 16px rgba(255,90,31,.32);cursor:pointer;}
  .btn:active{transform:scale(.98);}
  .btn.ghost{background:var(--card);color:var(--ink);box-shadow:var(--shadow);}
  .btn.sm{padding:11px;font-size:13px;}

  /* week tabs */
  #weeks{display:flex;gap:8px;overflow-x:auto;padding:14px 0 4px;scrollbar-width:none;}
  #weeks::-webkit-scrollbar{display:none;}
  .wtab{flex:0 0 auto;background:var(--card);color:var(--mute);border:none;box-shadow:var(--shadow);
    font-size:13px;font-weight:800;padding:9px 15px;border-radius:999px;cursor:pointer;white-space:nowrap;}
  .wtab.on{background:var(--accent);color:#fff;}
  .wtab .pct{font-size:10px;opacity:.85;margin-left:5px;}

  /* day card */
  .day{margin-bottom:12px;overflow:hidden;}
  .dhead{display:flex;align-items:flex-start;gap:12px;padding:15px 16px;cursor:pointer;}
  .dnum{width:38px;height:38px;border-radius:12px;background:var(--soft);color:var(--accent);font-weight:800;
    font-size:15px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .dtitle{font-size:16px;font-weight:800;line-height:1.15;}
  .dfocus{font-size:12px;color:var(--mute);margin-top:2px;}
  .dchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;}
  .check{width:28px;height:28px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto;cursor:pointer;
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:800;background:var(--card);}
  .check.on{background:var(--green);border-color:var(--green);}
  .day.done .dtitle{color:var(--mute);}
  .dbody{display:none;padding:0 16px 16px;}
  .day.open .dbody{display:block;}
  .sectlabel{font-size:11px;font-weight:800;letter-spacing:.5px;color:var(--accent);text-transform:uppercase;margin:16px 0 8px;}
  .mini{font-size:13.5px;line-height:1.5;}
  .mlist{list-style:none;}
  .mlist li{padding:7px 0;border-top:1px solid var(--line);display:flex;gap:10px;align-items:flex-start;}
  .mlist li:first-child{border-top:none;}
  .mlist .mn{font-weight:800;color:var(--mute);min-width:64px;font-size:12px;padding-top:3px;}
  .mlist .mx{flex:1;}
  .mlist .mnm{font-weight:700;font-size:13.5px;}
  .mlist .mcue{font-size:11.5px;color:var(--mute);}

  /* minute plan w/ inputs */
  .plan{display:flex;flex-direction:column;gap:7px;}
  .prow{display:flex;align-items:center;gap:10px;background:var(--chip);border-radius:12px;padding:9px 11px;}
  .prow .pm{font-size:11px;font-weight:800;color:var(--mute);width:46px;flex:0 0 auto;}
  .prow .pnm{flex:1;font-size:13px;font-weight:700;min-width:0;}
  .prow .pnm small{display:block;font-weight:600;color:var(--mute);font-size:10.5px;}
  .prow .ptarget{font-size:13px;font-weight:800;color:var(--accent);white-space:nowrap;}
  .prow input{width:52px;border:1px solid var(--line);border-radius:9px;padding:7px;font-size:13px;text-align:center;
    background:#fff;font-weight:700;color:var(--ink);}
  .prow input:focus{outline:none;border-color:var(--accent);}
  textarea.note{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px;font-size:13.5px;
    font-family:inherit;resize:vertical;min-height:64px;background:#fff;margin-top:6px;}
  textarea.note:focus{outline:none;border-color:var(--accent);}
  .actual-h{display:flex;justify-content:space-between;font-size:11px;color:var(--mute);font-weight:700;padding:0 4px;margin-bottom:2px;}

  /* timer */
  #timer{position:fixed;inset:0;margin:0 auto;width:100%;max-width:480px;background:var(--bg);z-index:80;
    display:none;flex-direction:column;padding:calc(env(safe-area-inset-top) + 14px) 22px calc(env(safe-area-inset-bottom) + 22px);}
  #timer.show{display:flex;}
  #timer.flip{animation:flash .5s;}
  @keyframes flash{0%{background:var(--soft);}100%{background:var(--bg);}}
  #timer.ready{background:#1d1c16;}
  #timer.ready .tx-name,#timer.ready .tx-top,#timer.ready .tx-next,#timer.ready .secs{color:#fff;}
  #timer.done{background:var(--green);}
  #timer.done *{color:#fff!important;}
  .tx-top{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:800;
    letter-spacing:.4px;color:var(--mute);text-transform:uppercase;}
  .tx-x{font-size:26px;background:none;border:none;color:var(--mute);cursor:pointer;line-height:1;}
  .tx-mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring{position:relative;width:268px;height:268px;}
  .ring svg{transform:rotate(-90deg);}
  .ring .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring .secs{font-size:84px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
  .ring .readylbl{font-size:13px;font-weight:800;letter-spacing:1px;color:var(--mute);text-transform:uppercase;margin-top:4px;}
  .tx-em{font-size:40px;margin-top:8px;}
  .tx-name{font-size:24px;font-weight:800;text-align:center;margin-top:4px;line-height:1.15;}
  .tx-reps{font-size:17px;font-weight:800;color:var(--accent);margin-top:6px;}
  .tx-reps .pill{display:inline-block;background:var(--soft);padding:5px 14px;border-radius:999px;}
  .tx-cue{font-size:13px;color:var(--mute);text-align:center;margin-top:8px;max-width:330px;}
  .tx-next{font-size:13px;color:var(--mute);text-align:center;margin-top:14px;font-weight:600;}
  .tx-ctrl{display:flex;gap:14px;align-items:center;justify-content:center;margin-top:14px;}
  .tbtn{width:60px;height:60px;border-radius:50%;background:var(--card);box-shadow:var(--shadow);border:none;
    font-size:21px;color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .tbtn.main{width:80px;height:80px;background:var(--accent);color:#fff;font-size:30px;box-shadow:0 8px 22px rgba(255,90,31,.4);}
  .tx-dots{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-top:18px;}
  .tx-dots i{width:9px;height:9px;border-radius:50%;background:rgba(140,135,121,.3);}
  .tx-dots i.done{background:var(--accent);}
  .tx-dots i.cur{background:var(--accent);box-shadow:0 0 0 3px var(--soft);}

  .footer{text-align:center;color:var(--mute);font-size:11.5px;margin-top:18px;line-height:1.5;}
  /* bottom tab bar */
  #tabs{position:fixed;bottom:0;left:0;right:0;margin:0 auto;max-width:480px;background:var(--card);
    display:flex;border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);z-index:40;}
  #tabs button{flex:1;background:none;border:none;padding:11px 0 9px;font-size:10.5px;font-weight:800;
    letter-spacing:.4px;color:var(--mute);cursor:pointer;text-transform:uppercase;
    display:flex;flex-direction:column;align-items:center;gap:3px;}
  #tabs button .ic{font-size:19px;line-height:1;filter:grayscale(1) opacity(.55);}
  #tabs button.on{color:var(--accent);}
  #tabs button.on .ic{filter:none;}

  /* progress */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
  .stat{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:15px;}
  .stat .ic{float:right;font-size:17px;}
  .stat .v{font-size:26px;font-weight:800;color:var(--accent);line-height:1;}
  .stat .l{font-size:11.5px;color:var(--mute);margin-top:6px;font-weight:600;}
  .bars{display:flex;align-items:flex-end;gap:6px;height:118px;}
  .bars .b{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:5px;}
  .bars .b .bar{width:100%;max-width:26px;background:#EFEBE2;border-radius:6px 6px 3px 3px;min-height:4px;}
  .bars .b .bar.has{background:var(--accent);}
  .bars .b .bl{font-size:9.5px;color:var(--mute);font-weight:700;}
  .bars .b .bv{font-size:10px;color:var(--ink);font-weight:800;min-height:12px;}
  .mbar{margin:11px 0;}
  .mbar .top{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px;}
  .mbar .top .nm{font-weight:700;display:flex;align-items:center;gap:6px;}
  .mbar .top .vl{font-weight:800;color:var(--accent);}
  .track{height:9px;background:#EFEBE2;border-radius:99px;overflow:hidden;}
  .track .fill{height:100%;border-radius:99px;background:var(--accent);}
  .hrow{display:flex;align-items:center;gap:11px;padding:11px 0;border-top:1px solid var(--line);}
  .hrow:first-child{border-top:none;}
  .hrow .hd{width:46px;flex:0 0 auto;text-align:center;}
  .hrow .hd .dn{font-size:18px;font-weight:800;line-height:1;}
  .hrow .hd .mo{font-size:9.5px;font-weight:800;color:var(--mute);text-transform:uppercase;}
  .hrow .hx{flex:1;min-width:0;}
  .hrow .ht{font-size:13.5px;font-weight:700;}
  .hrow .hs{font-size:11.5px;color:var(--mute);}
  .hrow .hr{font-size:13px;font-weight:800;color:var(--accent);white-space:nowrap;}
  .empty{text-align:center;color:var(--mute);font-size:14px;padding:40px 16px;line-height:1.55;}
  .hide{display:none!important;}
</style>
</head>
<body>
<div id="app"></div>

<nav id="tabs">
  <button data-tab="program" class="on"><span class="ic">📋</span>Program</button>
  <button data-tab="progress"><span class="ic">📊</span>Progress</button>
</nav>

<div id="timer">
  <div class="tx-top"><span id="txTop">MIN 1 / 12</span><button class="tx-x" id="txClose">✕</button></div>
  <div class="tx-mid">
    <div class="ring">
      <svg width="268" height="268">
        <circle cx="134" cy="134" r="120" fill="none" stroke="rgba(140,135,121,.18)" stroke-width="15"/>
        <circle id="txRing" cx="134" cy="134" r="120" fill="none" stroke="#FF5A1F" stroke-width="15"
          stroke-linecap="round" stroke-dasharray="753.98" stroke-dashoffset="0"/>
      </svg>
      <div class="ctr"><div class="secs" id="txSecs">0:60</div><div class="readylbl" id="txReady">Seconds left</div></div>
    </div>
    <div class="tx-em" id="txEm">🔔</div>
    <div class="tx-name" id="txName">Kettlebell Swing</div>
    <div class="tx-reps" id="txReps"><span class="pill">× 12 reps</span></div>
    <div class="tx-cue" id="txCue"></div>

<script>
/* ===================== EXERCISES ===================== */
var EX = {
  swing:    {n:"Kettlebell Swing", s:"Swing", e:"🔔", cue:"Hinge & snap the hips — float the bell to chest height."},
  goblet:   {n:"Goblet Squat", s:"Goblet", e:"🔔", cue:"Bell at the chest, elbows inside the knees, chest tall."},
  clean:    {n:"KB Clean (alternating)", s:"Clean", e:"🔔", cue:"Tame the arc — guide it into a soft catch in the rack."},
  press:    {n:"KB Shoulder Press (alt.)", s:"Press", e:"🔔", cue:"Ribs down, brace, press to a full overhead lockout."},
  row:      {n:"Bent-Over Row (alt.)", s:"Row", e:"🔔", cue:"Flat back, hinge — drive the elbow to the hip."},
  deadlift: {n:"Kettlebell Deadlift", s:"Deadlift", e:"🔔", cue:"Hinge with a flat back, drive through the floor to stand."},
  pu_wide:  {n:"Push-Up · Wide / Chest", s:"Chest", e:"🟥", cue:"Board RED — wide hands, chest emphasis.", grip:"chest"},
  pu_narrow:{n:"Push-Up · Narrow / Triceps", s:"Triceps", e:"🟨", cue:"Board YELLOW — hands close, elbows tight, triceps.", grip:"triceps"},
  pu_std:   {n:"Push-Up · Shoulder-Width", s:"Shoulders", e:"🟦", cue:"Board BLUE — shoulder-width, balanced push.", grip:"shoulder"},
  pu_lats:  {n:"Push-Up · Lats", s:"Lats", e:"🟩", cue:"Board GREEN — wide-low hands, back & shoulders.", grip:"lats"},
};
var GRIPVAR = {chest:"var(--chest)",triceps:"var(--triceps)",shoulder:"var(--shoulder)",lats:"var(--lats)"};

/* ===================== WARM-UP / COOLDOWN ===================== */
var WARMUP = [
  ["Neck & shoulder rolls","30s — loosen up and find your breathing."],
  ["Arm circles","20s each way — open the shoulders for pressing."],
  ["Bodyweight hip hinges","10 reps — rehearse the swing pattern."],
  ["Bodyweight squats","10 reps — wake up the legs and hips."],
  ["Scapular push-ups","10 reps — prep the shoulders for push-ups."],
  ["Light KB deadlifts","8 reps — feel the hinge with the bell."],
  ["Practice swings","10 reps — dial it in before the clock starts."],
];
var COOLDOWN = [
  ["Standing forward fold","45s — release the hamstrings and low back."],
  ["Doorway chest stretch","30s each side — open the chest after pushing."],
  ["Kneeling hip-flexor stretch","30s each side — counter all the hinging."],
  ["Child's pose","1 min — breathe slow and down-regulate."],
  ["Cross-body shoulder stretch","30s each side — for the pressing arm."],
  ["Box breathing","1 min — 4 in, 4 hold, 4 out, 4 hold."],
];

/* ===================== PROGRESSION ===================== */
function reps(ex, week){
  // newly-introduced lifts start fresh at week 5
  var fresh = (ex==="row"||ex==="deadlift") ? Math.max(1, week-4) : week;
  var tbl = {
    swing:[12,1,18], goblet:[8,1,14], clean:[8,1,14], press:[6,1,12],
    row:[8,1,12], deadlift:[8,1,12],
    pu_wide:[6,1,12], pu_narrow:[6,1,12], pu_std:[6,1,12], pu_lats:[6,1,12]
  }[ex];
  return Math.min(tbl[2], tbl[0] + tbl[1]*(fresh-1));
}
function weekMinutes(w){ return [0,10,10,12,12,14,14,16,16][w]; }

// 5 day archetypes per week
var DAYS = [
  {title:"Swing & Chest", focus:"Hinge power + chest push", mode:"rotate",
   steps:function(w){return ["swing","pu_wide"];}},
  {title:"Squat & Triceps", focus:"Legs + triceps push", mode:"rotate",
   steps:function(w){return ["goblet","pu_narrow"];}},
  {title:"Clean, Press & Shoulders", focus:"Clean, overhead press & shoulder push", mode:"rotate",
   steps:function(w){return ["clean","press","pu_std"];}},
  {title:"Full-Body Strength Blocks", focus:"Same move each block — build volume", mode:"blocks",
   steps:function(w){return ["swing","goblet","pu_lats"];}},
  {title:null, focus:null, mode:"rotate", light:true,
   steps:function(w){return w>=5 ? ["deadlift","row","pu_lats"] : ["swing","pu_std"];}},
];

function distribute(total, parts){
  var base=Math.floor(total/parts), rem=total-base*parts, out=[];
  for(var i=0;i<parts;i++) out.push(base + (i<rem?1:0));
  return out;
}
function buildSession(week, di){
  var A=DAYS[di];
  var slugs=A.steps(week);
  var total = A.light ? Math.max(8, weekMinutes(week)-2) : weekMinutes(week);
  var title=A.title, focus=A.focus;
  if(di===4){ // day 5 changes at week 5
    title = week>=5 ? "Deadlift, Row & Pull" : "Pull & Push (lighter)";
    focus = week>=5 ? "New lifts: deadlift + row, with push-ups" : "Lighter mixed session — swings & push-ups";
  }
  var steps;
  if(A.mode==="blocks"){
    var mins=distribute(total, slugs.length);
    steps=slugs.map(function(s,i){return {ex:s, reps:reps(s,week), mins:mins[i]};});
  } else {
    steps=slugs.map(function(s){return {ex:s, reps:reps(s,week)};});
  }
  return {
    id:"w"+week+"d"+(di+1), week:week, day:di+1,
    title:title, focus:focus, mode:A.mode, totalMinutes:total,
    steps:steps, slugs:slugs
  };
}
// expand to per-minute timeline
function timeline(sess){
  var t=[];
  if(sess.mode==="blocks"){
    sess.steps.forEach(function(s){ for(var k=0;k<s.mins;k++) t.push({ex:s.ex,reps:s.reps}); });
  } else {
    var i=0;
    while(t.length<sess.totalMinutes){ var s=sess.steps[i%sess.steps.length]; t.push({ex:s.ex,reps:s.reps}); i++; }
  }
  return t;
}

/* ===================== STATE ===================== */
var KEY="emom_kb_v1";
var S=load();
function load(){ try{ return Object.assign({done:{},log:{},week:1,open:null}, JSON.parse(localStorage.getItem(KEY)||"{}")); }catch(e){ return {done:{},log:{},week:1,open:null}; } }
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){} }

/* ===================== HELPERS ===================== */
var $=function(s){return document.querySelector(s);};
var app=$("#app");
function el(t,c,h){var e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;}
function gripDot(slug){ var g=EX[slug].grip; return g? '<span class="dot" style="background:'+GRIPVAR[g]+'"></span>':''; }

/* ===================== RENDER PROGRAM ===================== */
function renderProgram(){
  app.innerHTML="";
  app.appendChild(el("div","eyebrow","EMOM · 16KG + PUSH-UP BOARD"));
  app.appendChild(el("h1","title","Every Minute, Ondrej"));
  app.appendChild(el("div","sub","Each minute: do the reps, then rest what's left. New minute, new move. 8-week beginner build — train 4–5 days, rest when you need it."));

  // week tabs
  var wt=el("div"); wt.id="weeks";
  for(var w=1;w<=8;w++){
    (function(w){
      var done=0; for(var d=1;d<=5;d++){ if(S.done["w"+w+"d"+d]) done++; }
      var b=el("button","wtab"+(w===S.week?" on":""),"Week "+w+'<span class="pct">'+done+"/5</span>");
      b.onclick=function(){ S.week=w; S.open=null; save(); render(); window.scrollTo(0,0); };
      wt.appendChild(b);
    })(w);
  }
  app.appendChild(wt);

  // intro line for week
  var intro = weekIntro(S.week);
  app.appendChild(el("div","sub","<b style='color:var(--ink)'>Week "+S.week+"</b> · "+intro));

  // day cards
  var wrap=el("div"); wrap.style.marginTop="12px";
  for(var d=0;d<5;d++){ wrap.appendChild(dayCard(buildSession(S.week,d))); }
  app.appendChild(wrap);

  app.appendChild(el("div","footer","Single 16kg bell · push-up board (🟥 chest · 🟨 triceps · 🟦 shoulders · 🟩 lats).<br>Your reps & checkmarks save on this phone only."));
}
function weekIntro(w){
  var m=weekMinutes(w);
  var t=[ "", "Foundations — short "+m+"-min EMOMs, easy reps. Nail your form.",
    "Same length, a touch more volume. Keep the bell moving with control.",
    m+"-min EMOMs now. Reps are climbing — stay sharp on technique.",
    "Build week — hold your form as the reps tick up.",
    "New movements arrive: <b>deadlift & row</b> on Day 5. Sessions grow to "+m+" min.",
    "Strength building — more reps, more minutes. You're past beginner now.",
    "Peak phase — "+m+"-min EMOMs near your top targets.",
    "Final week. Push for your best reps, then deload and retest." ];
  return t[w];
}

function dayCard(sess){
  var done=!!S.done[sess.id], open=S.open===sess.id;
  var c=el("div","card day"+(done?" done":"")+(open?" open":""));
  // header
  var head=el("div","dhead");
  var num=el("div","dnum","D"+sess.day);
  var mid=el("div"); mid.style.flex="1"; mid.style.minWidth="0";
  mid.innerHTML='<div class="dtitle">'+sess.title+'</div><div class="dfocus">'+sess.focus+'</div>';
  var chips=el("div","dchips");
  chips.innerHTML =
    '<span class="chip accent">⏱ '+sess.totalMinutes+' min</span>'+
    '<span class="chip">'+(sess.mode==="blocks"?"Blocks":"Rotation")+'</span>'+
    sess.slugs.map(function(s){ return '<span class="chip">'+gripDot(s)+EX[s].s+'</span>'; }).join("");
  mid.appendChild(chips);
  var chk=el("div","check"+(done?" on":""), done?"✓":"");
  chk.onclick=function(ev){ ev.stopPropagation(); markDone(sess.id, !S.done[sess.id]); render(); };
  head.appendChild(num); head.appendChild(mid); head.appendChild(chk);
  head.onclick=function(){ S.open=open?null:sess.id; save(); render(); };
  c.appendChild(head);

  // body
  var body=el("div","dbody");
  // start button
  var start=el("button","btn","▶  START EMOM");
  start.onclick=function(ev){ ev.stopPropagation(); launchTimer(sess); };
  body.appendChild(start);

  // warm-up
  body.appendChild(el("div","sectlabel","Warm-up · ~5 min"));
  var wu=el("ul","mlist");
  WARMUP.forEach(function(x){ wu.appendChild(el("li",null,'<div class="mx"><div class="mnm">'+x[0]+'</div><div class="mcue">'+x[1]+'</div></div>')); });
  body.appendChild(wu);

  // the EMOM minute plan with actual-rep inputs
  body.appendChild(el("div","sectlabel","The EMOM · log your actual reps"));
  body.appendChild(el("div","actual-h","<span>Minute · target</span><span>Actual</span>"));
  var tl=timeline(sess);
  var log=S.log[sess.id]||{reps:{},note:""};
  var plan=el("div","plan");
  tl.forEach(function(m,i){
    var ex=EX[m.ex];
    var prow=el("div","prow");
    prow.innerHTML='<div class="pm">MIN '+(i+1)+'</div>'+
      '<div class="pnm">'+gripDot(m.ex)+ex.n+'<small>'+ex.cue+'</small></div>'+
      '<div class="ptarget">×'+m.reps+'</div>';
    var inp=el("input"); inp.type="number"; inp.inputMode="numeric"; inp.placeholder="–";
    inp.value=(log.reps&&log.reps[i+1]!=null)?log.reps[i+1]:"";
    inp.onchange=function(){ var L=S.log[sess.id]||(S.log[sess.id]={reps:{},note:""}); L.reps[i+1]=inp.value; if(!L.date)L.date=todayStr(); save(); };
    prow.appendChild(inp);
    plan.appendChild(prow);
  });
  body.appendChild(plan);

  // session note
  body.appendChild(el("div","sectlabel","Session notes"));
  var ta=el("textarea","note"); ta.placeholder="How did it feel? Bell too light/heavy? Push-ups to failure? Log anything…";
  ta.value=(log.note||"");
  ta.onchange=function(){ var L=S.log[sess.id]||(S.log[sess.id]={reps:{},note:""}); L.note=ta.value; if(!L.date)L.date=todayStr(); save(); };
  body.appendChild(ta);

  // cooldown
  body.appendChild(el("div","sectlabel","Cooldown · ~5 min"));
  var cd=el("ul","mlist");
  COOLDOWN.forEach(function(x){ cd.appendChild(el("li",null,'<div class="mx"><div class="mnm">'+x[0]+'</div><div class="mcue">'+x[1]+'</div></div>')); });
  body.appendChild(cd);

  // mark complete shortcut
  var mc=el("button","btn ghost sm",done?"✓ Completed — tap to undo":"Mark this session complete");
  mc.style.marginTop="14px";
  mc.onclick=function(ev){ ev.stopPropagation(); markDone(sess.id, !S.done[sess.id]); render(); };
  body.appendChild(mc);

  c.appendChild(body);
  return c;
}

/* ===================== EMOM TIMER ENGINE ===================== */
var T={ tl:[], sess:null, min:0, sec:60, paused:true, tick:null, lead:0, ac:null, wl:null };
function launchTimer(sess){
  T.sess=sess; T.tl=timeline(sess); T.min=0; T.sec=60; T.paused=false; T.lead=5;
  buildDots();
  $("#timer").classList.add("show");
  $("#txReady").textContent="Get ready";
  $("#timer").classList.add("ready");
  $("#txPlay").textContent="⏸";
  try{ T.ac=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  requestWake();
  run();
}
function buildDots(){
  var d=$("#txDots"); d.innerHTML="";
  for(var i=0;i<T.tl.length;i++) d.appendChild(el("i"));
}
function paintDots(){
  var dots=$("#txDots").children;
  for(var i=0;i<dots.length;i++){ dots[i].className = i<T.min?"done":(i===T.min&&T.lead<=0?"cur":""); }
}
function showMinute(){
  var P=$("#timer");
  if(T.lead>0){
    P.classList.add("ready");
    $("#txSecs").textContent=T.lead;
    $("#txReady").textContent="Get ready";
    $("#txTop").textContent="STARTS IN";
    var first=EX[T.tl[0].ex];
    $("#txEm").textContent=first.e; $("#txName").textContent=first.n;
    $("#txReps").innerHTML='<span class="pill">× '+T.tl[0].reps+' reps</span>';
    $("#txCue").textContent=first.cue;
    $("#txNext").textContent="First up when the clock starts";
    setRing(T.lead/5);
    return;
  }
  P.classList.remove("ready");
  var m=T.tl[T.min], ex=EX[m.ex];
  $("#txTop").textContent="MIN "+(T.min+1)+" / "+T.tl.length;
  $("#txReady").textContent=(T.tl.length-T.min-1)+" min left";
  $("#txEm").textContent=ex.e;
  $("#txName").textContent=ex.n;
  $("#txReps").innerHTML='<span class="pill">× '+m.reps+' reps</span>';
  $("#txCue").textContent=ex.cue;
  var nx=T.tl[T.min+1];
  $("#txNext").textContent= nx ? ("NEXT MIN · "+EX[nx.ex].n+" × "+nx.reps) : "LAST MINUTE — finish strong!";
  setSecs();
  paintDots();
}
function setSecs(){
  var s=T.sec; $("#txSecs").textContent="0:"+(s<10?"0":"")+s;
  setRing(T.sec/60);
}
function setRing(frac){ $("#txRing").style.strokeDashoffset = 753.98*(1-frac); }
function run(){
  clearInterval(T.tick);
  showMinute();
  T.tick=setInterval(function(){
    if(T.paused) return;
    if(T.lead>0){
      T.lead--;
      if(T.lead<=0){ newMinuteCue(); showMinute(); } else { beep(620,.08); $("#txSecs").textContent=T.lead; setRing(T.lead/5); }
      return;
    }
    T.sec--;
    if(T.sec<=3 && T.sec>0) beep(660,.08);
    if(T.sec<=0){
      T.min++;
      if(T.min>=T.tl.length){ finish(); return; }
      T.sec=60; newMinuteCue(); flash(); showMinute(); return;
    }
    setSecs();
  },1000);
}
function newMinuteCue(){ beep(880,.18); setTimeout(function(){beep(1180,.16);},120); if(navigator.vibrate) navigator.vibrate([120,60,120]); }
function flash(){ var P=$("#timer"); P.classList.remove("flip"); void P.offsetWidth; P.classList.add("flip"); }
function finish(){
  clearInterval(T.tick); releaseWake();
  beep(880,.2); setTimeout(function(){beep(1320,.3);},200);
  if(navigator.vibrate) navigator.vibrate([200,80,200,80,300]);
  if(T.sess){ markDone(T.sess.id, true); }
  var P=$("#timer"); P.classList.add("done"); P.classList.remove("ready");
  $("#txTop").textContent="COMPLETE";
  $("#txSecs").textContent="✓"; $("#txReady").textContent="Session done";
  $("#txEm").textContent="💪"; $("#txName").textContent="Nice work, Ondrej!";
  $("#txReps").innerHTML='<span class="pill" style="background:rgba(255,255,255,.25)">'+T.tl.length+' minutes done</span>';
  $("#txCue").textContent="Logged as complete. Don't skip the cooldown.";
  $("#txNext").textContent="";
  setRing(1);
  $("#txPlay").textContent="✓";
}
function closeTimer(){
  clearInterval(T.tick); releaseWake();
  var P=$("#timer"); P.classList.remove("show","done","ready","flip");
  $("#txPlay").textContent="▶";
  render();
}

$("#txPlay").onclick=function(){
  if($("#timer").classList.contains("done")){ closeTimer(); return; }
  T.paused=!T.paused; $("#txPlay").textContent=T.paused?"▶":"⏸";
  if(!T.paused && T.ac && T.ac.state==="suspended") T.ac.resume();
};
$("#txReset").onclick=function(){
  T.min=0; T.sec=60; T.lead=5; T.paused=true; $("#txPlay").textContent="▶";
  $("#timer").classList.remove("done"); run();
};
$("#txSkip").onclick=function(){
  if(T.lead>0){ T.lead=0; newMinuteCue(); showMinute(); return; }
  T.min++; T.sec=60;
  if(T.min>=T.tl.length){ finish(); return; }
  flash(); showMinute();
};
$("#txClose").onclick=function(){
  if($("#timer").classList.contains("done")){ closeTimer(); return; }
  if(confirm("End this EMOM? Your logged reps are saved.")) closeTimer();
};

/* audio + wake lock */
function beep(freq,dur){
  try{ if(!T.ac) T.ac=new (window.AudioContext||window.webkitAudioContext)();
    var o=T.ac.createOscillator(), g=T.ac.createGain();
    o.frequency.value=freq; o.type="sine"; o.connect(g); g.connect(T.ac.destination);
    g.gain.setValueAtTime(.0001,T.ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.5,T.ac.currentTime+.01);
    g.gain.exponentialRampToValueAtTime(.0001,T.ac.currentTime+dur);
    o.start(); o.stop(T.ac.currentTime+dur);
  }catch(e){}
}
function requestWake(){ try{ navigator.wakeLock.request("screen").then(function(w){T.wl=w;}); }catch(e){} }
function releaseWake(){ try{ if(T.wl){T.wl.release(); T.wl=null;} }catch(e){} }
document.addEventListener("visibilitychange",function(){ if(document.visibilityState==="visible" && $("#timer").classList.contains("show") && !$("#timer").classList.contains("done")) requestWake(); });

/* ===================== TABS + ROUTER ===================== */
var TAB="program";
function render(){
  document.querySelectorAll("#tabs button").forEach(function(b){ b.classList.toggle("on", b.dataset.tab===TAB); });
  if(TAB==="progress") renderProgress(); else renderProgram();
}
document.querySelectorAll("#tabs button").forEach(function(b){
  b.onclick=function(){ TAB=b.dataset.tab; render(); window.scrollTo(0,0); };
});

/* ===================== STATS ===================== */
function todayStr(){ var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function markDone(id,on){ if(on){ S.done[id]=todayStr(); } else { delete S.done[id]; } save(); }
function catOf(ex){ return {swing:"Swings",goblet:"Goblet Squats",clean:"Cleans",press:"Presses",row:"Rows",deadlift:"Deadlifts",
  pu_wide:"Push-ups",pu_narrow:"Push-ups",pu_std:"Push-ups",pu_lats:"Push-ups"}[ex]; }
function catEmoji(c){ return c==="Push-ups"?"🙌":"🔔"; }
function idMeta(id){ var m=id.match(/^w(\d+)d(\d+)$/); var week=+m[1], day=+m[2]; var sess=buildSession(week, day-1); return {week:week, day:day, sess:sess, tl:timeline(sess)}; }
function dateVal(id){ var dv=S.done[id]; if(typeof dv==="string") return dv; var L=S.log[id]; return (L&&L.date)?L.date:null; }
function computeStreak(dates){
  if(!dates.length) return 0;
  var set={}; dates.forEach(function(d){ set[d]=1; });
  function key(dt){ return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0"); }
  var cur=new Date(); cur.setHours(12,0,0,0);
  if(!set[key(cur)]){ cur.setDate(cur.getDate()-1); if(!set[key(cur)]) return 0; }
  var n=0; while(set[key(cur)]){ n++; cur.setDate(cur.getDate()-1); }
  return n;
}
function stats(){
  var ids={}; Object.keys(S.done).forEach(function(k){ids[k]=1;}); Object.keys(S.log).forEach(function(k){ids[k]=1;});
  var totalReps=0, movement={}, pr={}, list=[], weekCounts=[0,0,0,0,0,0,0,0,0], minutes=0, dateSet={};
  Object.keys(ids).forEach(function(id){
    if(!/^w\d+d\d+$/.test(id)) return;
    var m=idMeta(id), log=S.log[id]||{reps:{}}, sr=0, anyLog=false;
    m.tl.forEach(function(mm,i){
      var v=(log.reps)?parseInt(log.reps[i+1],10):NaN;
      if(!isNaN(v)&&v>0){ anyLog=true; sr+=v; var c=catOf(mm.ex); movement[c]=(movement[c]||0)+v; if(v>(pr[c]||0)) pr[c]=v; }
    });
    totalReps+=sr;
    var isDone=!!S.done[id]; var date=dateVal(id);
    if(isDone){ weekCounts[m.week]++; minutes+=m.sess.totalMinutes; if(date) dateSet[date]=1; }
    if(isDone||anyLog){ list.push({id:id,week:m.week,day:m.day,title:m.sess.title,mins:m.sess.totalMinutes,reps:sr,date:date,done:isDone}); }
  });
  var sessionsDone=Object.keys(S.done).filter(function(id){ return /^w\d+d\d+$/.test(id); }).length;
  list.sort(function(a,b){ if(a.date&&b.date&&a.date!==b.date) return a.date<b.date?1:-1; if(a.date&&!b.date) return -1; if(!a.date&&b.date) return 1; return (b.week-a.week)||(b.day-a.day); });
  return {sessionsDone:sessionsDone,totalReps:totalReps,minutes:minutes,streak:computeStreak(Object.keys(dateSet)),
    movement:movement,pr:pr,sessions:list,weekCounts:weekCounts,activeDays:Object.keys(dateSet).length};
}
function fmtDate(iso){ var d=new Date(iso+"T12:00:00"); var w=["SUN","MON","TUE","WED","THU","FRI","SAT"]; return {dn:d.getDate(), mo:w[d.getDay()]}; }
function nfmt(n){ return n.toLocaleString("en-US"); }

/* ===================== PROGRESS VIEW ===================== */
function renderProgress(){
  app.innerHTML="";
  app.appendChild(el("div","eyebrow","YOUR NUMBERS"));
  app.appendChild(el("h1","title","Progress"));
  var st=stats();
  if(st.sessionsDone===0 && st.sessions.length===0){
    app.appendChild(el("div","empty","No sessions logged yet.<br><br>Finish an EMOM (or tick a day complete and type in your actual reps) and your stats build here automatically — total reps, minutes, streak, volume by movement and a dated history."));
    return;
  }
  function stat(v,l,ic){ return '<div class="stat"><span class="ic">'+ic+'</span><div class="v">'+v+'</div><div class="l">'+l+'</div></div>'; }
  var g=el("div","grid2");
  g.innerHTML = stat(st.sessionsDone,"Sessions done","✅")
    + stat(nfmt(st.totalReps),"Total reps logged","🔁")
    + stat(st.minutes,"Minutes trained","⏱️")
    + stat(st.streak+(st.streak===1?" day":" days"),"Current streak","🔥");
  app.appendChild(g);

  var pct=Math.round(st.sessionsDone/40*100);
  var comp=el("div","card"); comp.style.cssText="padding:15px;margin:12px 0;";
  comp.innerHTML='<div style="display:flex;justify-content:space-between;font-size:13.5px"><b>Program completion</b><span class="muted">'+st.sessionsDone+' / 40 sessions</span></div>'
    +'<div class="track" style="margin-top:9px"><div class="fill" style="width:'+Math.max(3,pct)+'%"></div></div>'
    +'<div class="muted" style="font-size:11.5px;margin-top:7px">'+pct+'% of the 8-week plan · '+st.activeDays+' active day'+(st.activeDays===1?'':'s')+'</div>';
  app.appendChild(comp);

  app.appendChild(sectLabel("Consistency · sessions per week"));
  var ch=el("div","card"); ch.style.cssText="padding:16px 12px 12px;";
  var bars=el("div","bars");
  for(var w=1;w<=8;w++){
    var cnt=st.weekCounts[w]; var h=Math.round(cnt/5*100);
    var b=el("div","b");
    b.innerHTML='<div class="bv">'+(cnt||"")+'</div><div class="bar'+(cnt?" has":"")+'" style="height:'+Math.max(4,h)+'%"></div><div class="bl">W'+w+'</div>';
    bars.appendChild(b);
  }
  ch.appendChild(bars); app.appendChild(ch);

  var cats=Object.keys(st.movement).sort(function(a,b){ return st.movement[b]-st.movement[a]; });
  if(cats.length){
    app.appendChild(sectLabel("Volume by movement"));
    var mc=el("div","card"); mc.style.cssText="padding:14px 16px;";
    var max=Math.max.apply(null,cats.map(function(c){ return st.movement[c]; }));
    cats.forEach(function(c){
      var v=st.movement[c], wd=Math.round(v/max*100);
      var row=el("div","mbar");
      row.innerHTML='<div class="top"><span class="nm">'+catEmoji(c)+' '+c+'</span><span class="vl">'+nfmt(v)+' reps</span></div>'
        +'<div class="track"><div class="fill" style="width:'+Math.max(5,wd)+'%"></div></div>'
        +'<div class="muted" style="font-size:10.5px;margin-top:4px">best set · '+st.pr[c]+' reps in a minute</div>';
      mc.appendChild(row);
    });
    app.appendChild(mc);
  }

  app.appendChild(sectLabel("Session history"));
  var hc=el("div","card"); hc.style.cssText="padding:4px 16px;";
  st.sessions.slice(0,40).forEach(function(s){
    var dd = s.date ? fmtDate(s.date) : {dn:"•",mo:"—"};
    var row=el("div","hrow");
    row.innerHTML='<div class="hd"><div class="dn">'+dd.dn+'</div><div class="mo">'+dd.mo+'</div></div>'
      +'<div class="hx"><div class="ht">W'+s.week+' D'+s.day+' · '+s.title+'</div><div class="hs">'+s.mins+' min EMOM'+(s.done?"":" · logged, not ticked")+'</div></div>'
      +'<div class="hr">'+(s.reps?nfmt(s.reps)+" reps":"—")+'</div>';
    hc.appendChild(row);
  });
  app.appendChild(hc);

  var reset=el("button",null,"Reset all progress");
  reset.style.cssText="width:100%;background:none;border:none;color:var(--mute);font-size:13px;padding:18px;cursor:pointer;text-decoration:underline;margin-top:6px;";
  reset.onclick=function(){ if(confirm("Erase all completions, reps and notes? This can't be undone.")){ S.done={}; S.log={}; save(); render(); } };
  app.appendChild(reset);
}
function sectLabel(t){ var e=el("div","sectlabel",t); e.style.marginTop="18px"; return e; }

render();
</script>
</body>
</html>
